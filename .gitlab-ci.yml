stages:
  - test
  - build

variables:
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true"
  GRADLE_USER_HOME: "$CI_PROJECT_DIR/.gradle"

  # Переменные для PostgreSQL в тестах
  POSTGRES_DB: $DB_NAME
  POSTGRES_USER: $DB_USER
  POSTGRES_PASSWORD: $DB_PASSWORD

# Кэш Gradle — сильно ускоряет повторные сборки
cache:
  key: ${CI_COMMIT_REF_SLUG}-gradle
  paths:
    - .gradle/
    - build/

# ====================== ТЕСТЫ ======================
test:
  stage: test
  image: eclipse-temurin:17-jdk   # Java 17 — идеально под твой проект

  services:
    - name: postgres:16
      alias: postgres

  variables:
    SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/$DB_NAME
    SPRING_DATASOURCE_USERNAME: $DB_USER
    SPRING_DATASOURCE_PASSWORD: $DB_PASSWORD
    SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver

  script:
    - ./gradlew clean test --no-daemon --stacktrace

  artifacts:
    when: always
    reports:
      junit: build/test-results/test/TEST-*.xml
    paths:
      - build/test-results/
      - build/reports/tests/

# ====================== СБОРКА ======================
build:
  stage: build
  image: eclipse-temurin:17-jdk

  script:
    - ./gradlew clean build -x test --no-daemon

  artifacts:
    paths:
      - build/libs/*.jar
    expire_in: 2 weeks
    when: on_success